version: 2

models:
  - name: dim_user_sessions
    config:
      materialized: view # Investigar sobre incremental como forma de materializar.
    columns:
      - name: user_session
        tests: [not_null, unique]
      - name: resolved_user_id
        tests: [not_null]
      - name: session_start
        tests: [not_null]
      - name: session_end
        tests: [not_null]
      - name: amount_events
        tests: [not_null]