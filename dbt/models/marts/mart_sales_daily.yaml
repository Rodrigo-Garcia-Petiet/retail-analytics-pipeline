version: 2

models:
  - name: mart_sales_daily
    config:
      materialized: incremental
      on_schema_change: fail
      contract:
        enforced: true
    columns:
      - name: event_date
        data_type: date
        tests: [not_null]

      - name: product_id
        data_type: number(38,0)
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: brand
        data_type: varchar

      - name: total_sum
        data_type: number(18,2)
        tests: [not_null]

      - name: quantity
        data_type: number(12,0)
        tests: [not_null]